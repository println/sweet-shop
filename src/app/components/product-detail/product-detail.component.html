<div class="container page-content" *ngIf="product$ | async as product; else loading">
    <div class="detail-grid">
        <div class="image-wrapper">
            <img [src]="product.imagemURL" [alt]="product.nome" (error)="handleImageError($event)">
        </div>
        <div class="info-wrapper">
            <h1>{{product.nome}}</h1>
            <p class="price">{{product.preco | currency:'BRL'}}</p>
            <p class="description">{{product.descricao}}</p>
            <div class="actions">
                <button class="add-btn" (click)="addToCart(product)">Adicionar ao Carrinho</button>
            </div>
        </div>
    </div>
</div>
<ng-template #loading>
    <div class="container loading">Carregando...</div>
</ng-template>
